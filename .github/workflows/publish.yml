name: Publish to PyPI

# Publishes the package to PyPI when you cut a GitHub Release. Uses PyPI "Trusted
# Publishing" (OIDC) — NO API token is stored in the repo. One-time setup is
# required on PyPI before the first release; see RELEASING.md.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/portmint-pulse
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
